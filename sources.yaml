# sources.yaml — Aviation public-document crawler source list
# Fields per entry:
#   group         : logical category (e.g. "FAA Handbooks", "Lycoming")
#   manual_type   : document type tag
#   url           : seed URL
#   mode          : "page" (crawl HTML for links) | "file" (direct download)
#   max_depth     : how many link-levels deep to follow (page mode only)
#   same_host_only: whether to stay on the same hostname
#   login_required: if true, skip download and record in _LOGIN_REQUIRED_TODO.md
#   notes         : human-readable context

sources:

